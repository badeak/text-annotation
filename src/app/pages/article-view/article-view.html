@if (article) {
  <nav class="toolbar">
    <div class="toolbar-left">
      <button (click)="back()"><app-icon name="arrow-left" /> {{ i18n.t('btn.back') }}</button>
    </div>
    <div class="toolbar-right">
      <button
        class="btn-accent"
        data-annotate
        (click)="openAnnotationInput()"
        [disabled]="!hasSelection || panelOpen"
      >
        <app-icon name="annotate" /> {{ i18n.t('btn.annotate') }}
      </button>
      <button [routerLink]="i18n.path('article', article.id, 'edit')">
        <app-icon name="pencil" /> {{ i18n.t('btn.edit') }}
      </button>
      <button class="btn-danger" (click)="deleteArticle()">
        <app-icon name="trash" /> {{ i18n.t('btn.delete') }}
      </button>
    </div>
  </nav>

  <h2 class="article-title">{{ article.title }}</h2>

  <div class="page-content">
    <!-- prettier-ignore -->
    <div #contentEl class="article-content" (mouseup)="onTextSelected()">@for (segment of segments; track $index) {@if (segment.annotation) {<span class="annotated" [class.pending-highlight]="segment.pending" [style.text-decoration-color]="segment.annotation.color" [class.active]="editingAnnotation?.id === segment.annotation.id" (click)="selectAnnotation(segment.annotation, $event)" (mouseenter)="showTooltip(segment.annotation.note)" (mouseleave)="hideTooltip()" (mousemove)="moveTooltip($event)">{{ segment.text }}</span>} @else if (segment.pending) {<span class="pending-highlight">{{ segment.text }}</span>} @else {<span>{{ segment.text }}</span>}}</div>
  </div>

  @if (tooltipText) {
    <div class="annotation-tooltip" [style.left.px]="tooltipX" [style.top.px]="tooltipY">
      {{ tooltipText }}
    </div>
  }

  <app-annotation-panel
    [editingAnnotation]="editingAnnotation"
    [isOpen]="panelOpen"
    (saved)="onAnnotationSaved($event)"
    (cancelled)="cancelAnnotation()"
    (removed)="removeAnnotation()"
  />
} @else {
  <p>{{ i18n.t('msg.articleNotFound') }}</p>
  <button (click)="back()"><app-icon name="arrow-left" /> {{ i18n.t('btn.backToList') }}</button>
}
