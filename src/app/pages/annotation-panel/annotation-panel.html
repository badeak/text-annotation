<form class="annotation-panel" [class.open]="isOpen()" (ngSubmit)="onSave()">
  <h3>{{ editingAnnotation() ? i18n.t('page.editAnnotation') : i18n.t('page.addAnnotation') }}</h3>
  <label for="note">{{ i18n.t('label.note') }} <span class="required">*</span></label>
  <input
    id="note"
    [(ngModel)]="note"
    name="note"
    [placeholder]="i18n.t('placeholder.note')"
    [class.input-error]="!note.trim() && submitted"
    required
  />
  <span class="field-error" [class.hidden]="!(!note.trim() && submitted)">
    {{ i18n.t('error.noteRequired') }}
  </span>
  <label for="ann-color">{{ i18n.t('label.color') }}</label>
  <input id="ann-color" type="color" [(ngModel)]="color" name="color" />
  <div class="annotation-panel-actions">
    <button type="button" (click)="onCancel()">
      <app-icon name="x" /> {{ i18n.t('btn.cancel') }}
    </button>
    <div class="annotation-panel-actions-right">
      @if (editingAnnotation()) {
        <button type="button" class="btn-danger" (click)="onRemove()">
          <app-icon name="trash" />
        </button>
      }
      <button type="submit" class="btn-accent">
        <app-icon name="save" /> {{ i18n.t('btn.save') }}
      </button>
    </div>
  </div>
</form>
