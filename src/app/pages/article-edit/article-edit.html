@if (found) {
  <nav class="toolbar">
    <button type="button" (click)="cancel()">
      <app-icon name="arrow-left" /> {{ i18n.t('btn.back') }}
    </button>
    <span class="toolbar-spacer"></span>
    <h2 class="toolbar-title">{{ i18n.t('page.editArticle') }}</h2>
    <span class="toolbar-spacer"></span>
    <button class="btn-accent" type="submit" form="edit-form">
      <app-icon name="save" /> {{ i18n.t('btn.save') }}
    </button>
  </nav>

  <form id="edit-form" class="page-content" (ngSubmit)="save()" #form="ngForm">
    <div>
      <label for="title">{{ i18n.t('label.title') }} <span class="required">*</span></label>
      <input id="title" [(ngModel)]="title" name="title" required #titleField="ngModel" />
      <span class="field-error" [class.hidden]="!(titleField.invalid && submitted)">
        {{ i18n.t('error.titleRequired') }}
      </span>
    </div>

    <div class="field-grow">
      <label id="content-label"
        >{{ i18n.t('label.content') }} <span class="required">*</span></label
      >
      <div
        #contentEl
        class="content-editor"
        contenteditable="true"
        role="textbox"
        aria-labelledby="content-label"
      >
        @for (segment of segments; track $index) {
          @if (segment.annotationId) {
            <span
              class="annotated"
              [attr.data-annotation-id]="segment.annotationId"
              [title]="segment.note"
              [style.text-decoration-color]="segment.color"
              >{{ segment.text }}</span
            >
          } @else {
            <span>{{ segment.text }}</span>
          }
        }
      </div>
      <span class="field-error" [class.hidden]="!(submitted && contentEmpty)">
        {{ i18n.t('error.contentRequired') }}
      </span>
    </div>
  </form>
} @else {
  <p>{{ i18n.t('msg.articleNotFound') }}</p>
}
